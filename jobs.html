<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직업 탐색 - POLARIS</title>
    <meta name="description" content="나의 은하 유형에 맞는 직업을 탐색해보세요">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at 30% 20%, #1a1a2e 0%, #050510 60%, #000 100%);
            color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .page-wrap {
            max-width: 720px;
            margin: 0 auto;
            padding: 64px 1rem 1.5rem;
        }
        .page-header {
            text-align: center;
            margin-bottom: 1.2rem;
        }
        .page-header h1 {
            font-size: clamp(1.1rem, 3.5vw, 1.5rem);
            font-weight: 700;
            margin-bottom: 0.3rem;
        }
        .page-header p {
            font-size: 0.78rem;
            opacity: 0.6;
        }
        /* 은하 탭 */
        .galaxy-tabs {
            display: flex;
            gap: 0.4rem;
            overflow-x: auto;
            padding-bottom: 0.4rem;
            margin-bottom: 1rem;
            scrollbar-width: none;
        }
        .galaxy-tabs::-webkit-scrollbar { display: none; }
        .galaxy-tab {
            flex-shrink: 0;
            padding: 0.35rem 0.8rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            font-size: 0.73rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .galaxy-tab:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .galaxy-tab.active {
            color: #fff;
            border-color: var(--tab-color, #fff);
            background: color-mix(in srgb, var(--tab-color, #fff) 15%, transparent);
            box-shadow: 0 0 10px color-mix(in srgb, var(--tab-color, #fff) 30%, transparent);
        }
        /* 직업 그리드 */
        .jobs-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
        }
        .job-badge {
            display: inline-block;
            padding: 0.35rem 0.85rem;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.06);
            color: #fff;
            font-size: 0.75rem;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.18s;
        }
        .job-badge:hover {
            background: rgba(255,255,255,0.14);
            border-color: rgba(255,255,255,0.35);
            transform: translateY(-1px);
        }
        .job-badge .arrow { opacity: 0.45; margin-left: 3px; }
        /* 로딩 */
        .loading-wrap {
            text-align: center;
            padding: 2rem 0;
            opacity: 0.5;
        }
        .loading-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #fff;
            margin: 0 3px;
            animation: blink 1.2s infinite;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes blink {
            0%, 80%, 100% { opacity: 0.2; }
            40% { opacity: 1; }
        }
        .empty-state {
            text-align: center;
            padding: 1.5rem;
            opacity: 0.45;
            font-size: 0.78rem;
        }
        /* 카운트 */
        .jobs-count {
            font-size: 0.7rem;
            opacity: 0.4;
            margin-bottom: 0.7rem;
        }
    </style>
  <script type="module" crossorigin src="./assets/jobs-CjjZqkJ-.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="./assets/style-B3YVMFIX.css">
</head>
<body>
<div class="aurora-bg">
    <div class="nebula-point nebula-1"></div>
    <div class="nebula-point nebula-2"></div>
    <div class="nebula-point nebula-3"></div>
</div>

<header class="nav" style="position:fixed;top:0;left:0;right:0;z-index:100;">
    <div class="logo" onclick="location.href='index.html'" style="cursor:pointer;">POLARIS</div>
</header>

<div class="page-wrap">
    <div class="page-header">
        <h1>🔭 직업 탐색</h1>
        <p>은하를 옆으로 스와이프해 본인의 은하를 확인해보세요</p>
    </div>

    <div class="galaxy-tabs" id="galaxy-tabs"></div>

    <div class="jobs-count" id="jobs-count"></div>
    <div id="jobs-loading" class="loading-wrap">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
    </div>
    <div class="jobs-grid" id="jobs-grid"></div>
</div>

    <a href="results-guide.html" class="tab-item">

    </a>
</nav>

</body>
</html>
