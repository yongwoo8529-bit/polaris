<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLARIS - 은하 통신선 (Galaxy Signals)</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/style.css">
    <style>
        body { margin: 0; overflow-x: hidden; font-family: 'Noto Sans KR', sans-serif; background: #000; }
        #stars-bg { position: fixed; top: 0; left: 0; z-index: -1; width: 100%; height: 100%; }
        .board-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 100px 20px 60px; /* Adjusted for navbar */
            text-align: center;
        }

        /* [Navigation] */
        .top-nav {
            position: fixed;
            top: 0;
            width: 100%;
            max-width: 800px;
            height: 70px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            z-index: 500;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            left: 50%;
            transform: translateX(-50%);
        }

        .nav-logo { font-weight: 700; color: #fff; text-decoration: none; font-size: 20px; font-family: 'Orbitron', sans-serif; }
        .nav-links { display: flex; gap: 15px; }
        .nav-links a { color: rgba(255, 255, 255, 0.7); text-decoration: none; font-size: 13px; }

        .main-footer {
            width: 100%;
            max-width: 800px;
            padding: 40px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 10;
            margin: 0 auto;
        }
        .footer-bottom { text-align: center; font-size: 11px; color: rgba(255, 255, 255, 0.3); }
        h1 {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            text-shadow: 0 0 10px #fff;
            margin-bottom: 2rem;
            font-size: 2.5rem;
        }
        .filter-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 20px;
            margin-bottom: 30px;
            scrollbar-width: none;
        }
        .filter-tabs::-webkit-scrollbar { display: none; }
        .tab-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: 0.3s;
            font-size: 0.85rem;
        }
        .tab-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.5);
        }
        .signals-list {
            display: grid;
            gap: 20px;
            text-align: left;
        }
        .signal-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px;
            border-radius: 16px;
            backdrop-filter: blur(8px);
            animation: fadeIn 0.4s ease-out;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }
        .galaxy-name { font-weight: bold; font-size: 0.85rem; }
        .signal-date { font-size: 0.75rem; opacity: 0.5; }
        
        .signal-content {
            font-size: 1rem;
            color: #fff;
            line-height: 1.6;
            word-break: break-all;
            padding-bottom: 45px; /* 좋아요 공간 확보 */
        }
        
        .like-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 6px 15px;
            border-radius: 25px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
        }
        .like-btn:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
        .like-btn.liked { opacity: 0.4; pointer-events: none; }

        .fab-send {
            position: fixed; bottom: 30px; right: 30px;
            width: 60px; height: 60px; border-radius: 50%;
            background: #fff; color: #000; border: none; font-size: 1.5rem;
            cursor: pointer; box-shadow: 0 0 20px rgba(255,255,255,0.4);
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 200;
            display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-content {
            background: #111; border: 1px solid rgba(255,255,255,0.2); padding: 25px;
            border-radius: 20px; width: 100%; max-width: 500px;
        }
        textarea {
            width: 100%; height: 120px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: #fff;
            padding: 12px; font-family: inherit; resize: none; outline: none; margin: 15px 0;
            box-sizing: border-box;
        }
        .btn-submit { background: #fff; border: none; color: #000; padding: 12px 30px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <canvas id="stars-bg"></canvas>
    <nav class="top-nav">
        <a href="index.html" class="nav-logo">POLARIS</a>
        <div class="nav-links">
            <a href="index.html"></a>
            <a href="about.html"></a>
            <a href="results-guide.html"></a>
            <a href="blog.html"></a>
            <a href="privacy.html"></a>
        </div>
    </nav>

    <div class="board-container">
        <h1>GALAXY SIGNALS</h1>
        <div class="filter-tabs" id="filter-tabs">
            <div class="tab-btn active" data-id="all">전체 신호</div>
            <div class="tab-btn" data-id="1">🟣 탐구</div>
            <div class="tab-btn" data-id="2">🔵 질서</div>
            <div class="tab-btn" data-id="3">🟠 온기</div>
            <div class="tab-btn" data-id="4">🟡 울림</div>
            <div class="tab-btn" data-id="5">🟢 울타리</div>
            <div class="tab-btn" data-id="6">🌈 프리즘</div>
            <div class="tab-btn" data-id="7">🌑 정적</div>
        </div>
        <div class="signals-list" id="signals-list"></div>
    </div>

    <footer class="main-footer">
        <div class="footer-bottom">
            &copy; 2024 POLARIS PROJECT. <a href="privacy.html" style="color: inherit;">개인정보 처리방침</a>
        </div>
    </footer>

    <button class="fab-send" id="open-modal-btn">＋</button>

    <div class="modal-overlay" id="modal-overlay">
        <div class="modal-content">
            <h2 style="color:#fff; margin-bottom:5px;">신호 보내기</h2>
            <div class="type-selector" id="type-selector" style="display:flex; gap:5px; flex-wrap:wrap; margin:15px 0;">
                <div class="type-btn" data-type="1" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#ccc; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:0.8rem;">탐구</div>
                <div class="type-btn" data-type="2" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#ccc; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:0.8rem;">질서</div>
                <div class="type-btn" data-type="3" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#ccc; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:0.8rem;">온기</div>
                <div class="type-btn" data-type="4" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#ccc; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:0.8rem;">울림</div>
                <div class="type-btn" data-type="5" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#ccc; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:0.8rem;">울타리</div>
                <div class="type-btn" data-type="6" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#ccc; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:0.8rem;">프리즘</div>
                <div class="type-btn" data-type="7" style="background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); color:#ccc; padding:6px 12px; border-radius:8px; cursor:pointer; font-size:0.8rem;">정적</div>
            </div>
            <textarea id="signal-text" placeholder="예: 본인의 별명이나 닉네임으로 본인을 자유롭게 소개하고 본인의 이야기를 적어주세요!"></textarea>
            <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button onclick="document.getElementById('modal-overlay').classList.remove('active')" style="background:none; border:none; color:#777; cursor:pointer;">취소</button>
                <button class="btn-submit" id="submit-signal-btn">신호 발송</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('stars-bg'), ctx = canvas.getContext('2d'), signalsList = document.getElementById('signals-list'), filterTabs = document.getElementById('filter-tabs');
        const overlay = document.getElementById('modal-overlay'), openBtn = document.getElementById('open-modal-btn'), submitBtn = document.getElementById('submit-signal-btn'), typeBtns = document.querySelectorAll('.type-btn'), signalInput = document.getElementById('signal-text');
        
        let selectedType = 1;
        const galaxyNames = {1:"탐구의 은하",2:"질서의 은하",3:"온기의 은하",4:"울림의 은하",5:"울타리의 은하",6:"프리즘의 은하",7:"정적의 은하"};
        const galaxyColors = {1:"#a55eea",2:"#45aaf2",3:"#fd9644",4:"#fed330",5:"#26de81",6:"#fff",7:"#2c3e50"};

        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            const stars = []; for(let i=0; i<200; i++) stars.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, size:Math.random()*1.5, opacity:Math.random()});
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => { ctx.fillStyle=`rgba(255,255,255,${s.opacity})`; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill(); s.opacity+=(Math.random()-0.5)*0.02; if(s.opacity<0) s.opacity=0; if(s.opacity>1) s.opacity=1; });
                requestAnimationFrame(draw);
            } draw();
        }

        function loadSignals(filter = 'all') {
            signalsList.innerHTML = '';
            const allMessages = JSON.parse(localStorage.getItem('polaris_board_messages') || '[]');
            const filtered = filter === 'all' ? allMessages : allMessages.filter(m => m.type == filter);
            if(filtered.length === 0) { signalsList.innerHTML = '<div style="text-align:center; padding: 40px; opacity: 0.5;">아직 도착한 신호가 없습니다.</div>'; return; }

            filtered.sort((a,b) => b.time - a.time).forEach(msg => {
                const isLiked = (sessionStorage.getItem(`liked_${msg.time}`) === 'true');
                const card = document.createElement('div');
                card.className = 'signal-card'; card.style.borderLeft = `6px solid ${galaxyColors[msg.type] || '#fff'}`;
                card.innerHTML = `
                    <div class="signal-header">
                        <span class="galaxy-name" style="color:${galaxyColors[msg.type]}">${galaxyNames[msg.type]}</span>
                        <span class="signal-date">${new Date(msg.time).toLocaleDateString()}</span>
                    </div>
                    <div class="signal-content">${msg.text}</div>
                    <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="likeMessage(${msg.time})">❤️ <span>${msg.likes || 0}</span></button>
                `;
                signalsList.appendChild(card);
            });
        }

        window.likeMessage = (time) => {
            if (sessionStorage.getItem(`liked_${time}`) === 'true') return;
            const allMessages = JSON.parse(localStorage.getItem('polaris_board_messages') || '[]');
            const msg = allMessages.find(m => m.time === time);
            if (msg) {
                msg.likes = (msg.likes || 0) + 1;
                localStorage.setItem('polaris_board_messages', JSON.stringify(allMessages));
                sessionStorage.setItem(`liked_${time}`, 'true');
                loadSignals(document.querySelector('.tab-btn.active').dataset.id);
            }
        };

        openBtn.onclick = () => overlay.classList.add('active');
        typeBtns.forEach(btn => {
            btn.onclick = () => { typeBtns.forEach(b => b.style.background='rgba(255,255,255,0.1)'); btn.style.background='#fff'; btn.style.color='#000'; selectedType = parseInt(btn.dataset.type); };
        });
        document.querySelector('.type-btn[data-type="1"]').click();

        submitBtn.onclick = () => {
            const text = signalInput.value.trim(); if(!text) return;
            const allMessages = JSON.parse(localStorage.getItem('polaris_board_messages') || '[]');
            allMessages.push({ type: selectedType, text: text, time: Date.now(), likes: 0 });
            localStorage.setItem('polaris_board_messages', JSON.stringify(allMessages));
            signalInput.value = ''; overlay.classList.remove('active');
            loadSignals(document.querySelector('.tab-btn.active').dataset.id);
        };

        filterTabs.onclick = (e) => {
            if(e.target.classList.contains('tab-btn')) {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active'); loadSignals(e.target.dataset.id);
            }
        };

        initStars(); loadSignals();
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
