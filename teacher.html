<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교사 관리 - POLARIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background: #f0f2f8; color: #1a1a2e; min-height: 100vh; }

        header {
            background: #1a1a2e;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
        }
        .logo { color: #fff; font-size: 14px; letter-spacing: 3px; font-weight: 700; }
        .logo span { color: rgba(255,255,255,0.4); font-size: 12px; letter-spacing: 1px; font-weight: 400; margin-left: 8px; }
        header a { color: rgba(255,255,255,0.55); text-decoration: none; font-size: 13px; transition: color 0.2s; }
        header a:hover { color: #fff; }

        main { max-width: 680px; margin: 32px auto; padding: 0 20px 60px; }

        .tabs {
            display: flex;
            background: #fff;
            border-radius: 14px;
            padding: 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 11px;
            border: none;
            background: transparent;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            font-weight: 500;
            color: #999;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab-btn.active { background: #1a1a2e; color: #fff; font-weight: 700; }

        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.07);
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 14px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid #f0f0f8;
        }

        label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            color: #aaa;
            letter-spacing: 0.8px;
            margin-bottom: 7px;
            margin-top: 16px;
            text-transform: uppercase;
        }
        label:first-of-type { margin-top: 0; }

        input[type="text"] {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e8e8f4;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            color: #1a1a2e;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #4080ff; }
        input[type="text"]::placeholder { color: #ccc; }

        .btn-primary {
            width: 100%;
            margin-top: 20px;
            padding: 14px;
            background: #1a1a2e;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.85; }
        .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }

        .code-box {
            display: none;
            margin-top: 24px;
            background: linear-gradient(135deg, #f0f4ff 0%, #e8f0ff 100%);
            border: 2px solid #c0d4ff;
            border-radius: 16px;
            padding: 28px;
            text-align: center;
        }
        .code-label { font-size: 11px; font-weight: 700; color: #6080c0; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
        .code-value {
            font-size: 40px;
            font-weight: 900;
            letter-spacing: 10px;
            color: #1a1a2e;
            font-family: 'Courier New', monospace;
            margin-bottom: 4px;
        }
        .code-class { font-size: 12px; color: #888; margin-bottom: 14px; }
        .btn-copy {
            padding: 8px 22px;
            background: #4080ff;
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-copy:hover { opacity: 0.85; }
        .code-hint {
            margin-top: 14px;
            font-size: 12px;
            color: #6080c0;
            line-height: 1.7;
        }

        .search-row { display: flex; gap: 10px; align-items: stretch; }
        .search-row input { flex: 1; margin: 0; }
        .btn-search {
            padding: 12px 20px;
            background: #1a1a2e;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s;
        }
        .btn-search:hover { opacity: 0.85; }

        .results-area { display: none; }

        .class-bar {
            background: #1a1a2e;
            border-radius: 14px;
            padding: 18px 22px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            color: #fff;
        }
        .cb-name { font-size: 16px; font-weight: 700; }
        .cb-teacher { font-size: 12px; color: rgba(255,255,255,0.5); margin-top: 3px; }
        .cb-count { font-size: 32px; font-weight: 900; text-align: right; line-height: 1; }
        .cb-count-label { font-size: 10px; color: rgba(255,255,255,0.5); text-align: right; margin-top: 2px; }

        .dist-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
        .dist-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px 6px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .dist-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

        .result-table { width: 100%; border-collapse: collapse; }
        .result-table thead th {
            font-size: 10.5px;
            font-weight: 700;
            color: #bbb;
            letter-spacing: 0.5px;
            padding: 0 12px 10px;
            text-align: left;
            border-bottom: 1px solid #f0f0f8;
            text-transform: uppercase;
        }
        .result-table tbody tr { border-bottom: 1px solid #f8f8fc; }
        .result-table tbody tr:last-child { border: none; }
        .result-table tbody td { padding: 12px; font-size: 13px; color: #333; }

        .galaxy-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 10px;
            font-size: 11.5px;
            font-weight: 600;
        }
        .badge-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

        .empty-msg { text-align: center; padding: 32px 0; color: #ccc; font-size: 14px; }
        .error-msg { color: #e05c5c; font-size: 12px; margin-top: 8px; min-height: 18px; }
        .loading { color: #888; font-size: 12px; margin-top: 8px; }

        @media (max-width: 480px) {
            main { margin: 16px auto; }
            .card { padding: 20px; }
            .code-value { font-size: 30px; letter-spacing: 6px; }
            .class-bar { flex-direction: column; gap: 8px; }
            .cb-count { text-align: left; }
        }
    </style>
</head>
<body>

<!-- 비밀번호 게이트 -->
<div id="pw-gate" style="position:fixed; inset:0; z-index:9999; background:#1a1a2e; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div style="text-align:center; width:100%; max-width:280px;">
        <div style="color:#fff; font-size:13px; letter-spacing:4px; font-weight:900; margin-bottom:4px; font-family:'Courier New',monospace;">POLARIS</div>
        <div style="color:rgba(255,255,255,0.35); font-size:11px; letter-spacing:1.5px; margin-bottom:32px;">교사 전용</div>
        <input type="password" id="pw-input" placeholder="비밀번호" autocomplete="off"
               onkeydown="if(event.key==='Enter') checkPw()"
               style="width:100%; padding:13px 14px; background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.16); border-radius:10px; color:#fff; font-size:14px; text-align:center; outline:none; font-family:inherit; margin-bottom:8px;">
        <p id="pw-error" style="color:#e05c5c; font-size:12px; min-height:20px; margin-bottom:8px;"></p>
        <button onclick="checkPw()" style="width:100%; padding:13px; background:#4080ff; color:#fff; border:none; border-radius:10px; font-size:14px; font-weight:700; font-family:inherit; cursor:pointer;">확인</button>
    </div>
</div>
<script>
const _PW = 'polaris2026';
function checkPw() {
    if (document.getElementById('pw-input').value === _PW) {
        document.getElementById('pw-gate').style.display = 'none';
    } else {
        document.getElementById('pw-error').textContent = '비밀번호가 맞지 않습니다.';
        document.getElementById('pw-input').value = '';
        document.getElementById('pw-input').focus();
    }
}
</script>

<header>
    <span class="logo">POLARIS <span>교사 관리</span></span>
    <a href="index.html">← 홈으로</a>
</header>

<main>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('create')">학급 코드 발급</button>
        <button class="tab-btn" onclick="switchTab('view')">결과 조회</button>
    </div>

    <!-- 학급 코드 발급 -->
    <div id="tab-create" class="tab-panel active">
        <div class="card">
            <div class="card-title">새 학급 코드 만들기</div>
            <label>선생님 성함</label>
            <input type="text" id="teacher-name" placeholder="예: 김진로" maxlength="20">
            <label>학급명</label>
            <input type="text" id="class-name" placeholder="예: 2학년 3반" maxlength="30">
            <p id="create-error" class="error-msg"></p>
            <button class="btn-primary" id="create-btn" onclick="createClass()">학급 코드 생성하기</button>

            <div class="code-box" id="code-box">
                <div class="code-label">학급 코드</div>
                <div class="code-value" id="code-display"></div>
                <div class="code-class" id="code-class"></div>
                <button class="btn-copy" onclick="copyCode()">📋 코드 복사</button>

                <div style="margin-top:20px; padding-top:20px; border-top:1px solid #d0dcff;">
                    <div style="font-size:11px; font-weight:700; color:#6080c0; letter-spacing:1px; margin-bottom:12px;">학생용 QR 코드</div>
                    <img id="qr-img" src="" alt="QR코드" style="width:160px; height:160px; border-radius:10px; display:block; margin:0 auto;">
                    <div style="font-size:11px; color:#aaa; margin-top:8px; line-height:1.6;">
                        스캔하면 검사 페이지로 바로 이동<br>학급 코드가 자동으로 채워집니다
                    </div>
                    <button onclick="printQr()" style="margin-top:12px; padding:7px 18px; background:transparent; border:1.5px solid #c0d0ff; border-radius:20px; color:#4060cc; font-size:12px; font-weight:700; font-family:inherit; cursor:pointer;">🖨️ QR 인쇄</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 결과 조회 -->
    <div id="tab-view" class="tab-panel">
        <div class="card">
            <div class="card-title">학급 결과 조회</div>
            <label>학급 코드</label>
            <div class="search-row">
                <input type="text" id="view-code" placeholder="예: ABC123" maxlength="6"
                       style="text-transform:uppercase;"
                       oninput="this.value=this.value.toUpperCase()"
                       onkeydown="if(event.key==='Enter') loadResults()">
                <button class="btn-search" onclick="loadResults()">조회</button>
            </div>
            <p id="view-error" class="error-msg"></p>
        </div>

        <div class="results-area" id="results-area">
            <div class="class-bar">
                <div>
                    <div class="cb-name" id="cb-name"></div>
                    <div class="cb-teacher" id="cb-teacher"></div>
                </div>
                <div>
                    <div class="cb-count" id="cb-count">0</div>
                    <div class="cb-count-label">명 참여</div>
                </div>
            </div>
            <div id="auto-refresh-bar" style="font-size:11px; color:#aaa; text-align:right; margin-bottom:10px; margin-top:-8px;">
                🔄 자동 갱신 중 &nbsp;·&nbsp; <span id="last-updated">-</span>
            </div>

            <div class="card">
                <div class="card-title">성향 유형 분포</div>
                <div class="dist-wrap" id="dist-wrap"></div>
            </div>

            <div class="card">
                <div class="card-title">학생 결과 목록</div>
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; flex-wrap:wrap; gap:8px;">
                    <p style="font-size:12px; color:#aaa; margin:0;">📄 PDF 버튼을 눌러 학생의 결과를 PDF로 확인하세요!</p>
                    <button onclick="exportCsv()" style="padding:6px 14px; background:#1a6e3c; color:#fff; border:none; border-radius:8px; font-size:12px; font-weight:700; font-family:inherit; cursor:pointer; white-space:nowrap;">📊 Excel 내보내기</button>
                </div>
                <table class="result-table">
                    <thead>
                        <tr>
                            <th>이름</th>
                            <th>성향 유형</th>
                            <th>검사일시</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="results-tbody"></tbody>
                </table>
                <div id="empty-msg" class="empty-msg" style="display:none;">아직 참여한 학생이 없습니다.</div>
            </div>
        </div>
    </div>
</main>

    8: { tagline: '지금 방향을 찾는 중 — 정해지지 않은 것이 가능성', core: '현재 자신의 방향성을 깊이 성찰하는 단계에 있습니다. 외부의 기준보다 내면의 기준을 중시하는 성향이 강하며, 쉽게 흔들리지 않는 독립적인 판단력을 지니고 있습니다.', moment: '외부의 평가에 흔들리지 않고 스스로의 기준으로 선택을 내릴 때, 또는 타인이 지나쳤던 깊은 통찰을 발견했을 때 자신만의 가치를 확인합니다.', jobs: '' },
}

function genCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'
    return Array.from({ length: 6 }, () => chars[Math.floor(Math.random() * chars.length)]).join('')
}

let _refreshTimer = null
let _activeCode = null
let _rows = []

window.switchTab = (tab) => {
    document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', tab === 'create' ? i === 0 : i === 1))
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'))
    document.getElementById('tab-' + tab).classList.add('active')
    if (tab !== 'view' && _refreshTimer) { clearInterval(_refreshTimer); _refreshTimer = null }
}

window.createClass = async () => {
    const teacher = document.getElementById('teacher-name').value.trim()
    const cls = document.getElementById('class-name').value.trim()
    const errEl = document.getElementById('create-error')
    if (!teacher || !cls) { errEl.textContent = '선생님 성함과 학급명을 모두 입력해주세요.'; return }
    errEl.textContent = ''

    const btn = document.getElementById('create-btn')
    btn.disabled = true; btn.textContent = '생성 중...'

    let code
    for (let i = 0; i < 5; i++) {
        code = genCode()
        const { data } = await sb.from('classes').select('code').eq('code', code).maybeSingle()
        if (!data) break
    }

    const { error } = await sb.from('classes').insert({ code, teacher_name: teacher, class_name: cls })
    btn.disabled = false; btn.textContent = '학급 코드 생성하기'

    if (error) { errEl.textContent = '오류가 발생했습니다. 다시 시도해주세요.'; return }

    document.getElementById('code-display').textContent = code
    document.getElementById('code-class').textContent = `${teacher} 선생님 · ${cls}`
    document.getElementById('code-box').style.display = 'block'
    window._lastCode = code

    // QR 코드 생성 (학생 스캔 시 polaris.html?code=XXX 로 이동)
    const targetUrl = new URL('polaris.html?code=' + code, location.href).href
    document.getElementById('qr-img').src =
        'https://api.qrserver.com/v1/create-qr-code/?size=320x320&margin=10&data=' + encodeURIComponent(targetUrl)
    window._qrUrl = targetUrl
}

window.copyCode = () => {
    navigator.clipboard.writeText(window._lastCode || '').then(() => {
        const btn = document.querySelector('.btn-copy')
        const orig = btn.textContent
        btn.textContent = '✅ 복사됨'
        setTimeout(() => btn.textContent = orig, 1600)
    })
}

window.printQr = () => {
    const code = window._lastCode || ''
    const img = document.getElementById('qr-img').src
    const w = window.open('', '_blank', 'width=400,height=520')
    w.document.write(`<!DOCTYPE html><html><head><title>POLARIS QR - ${code}</title>
    <style>body{font-family:sans-serif;text-align:center;padding:40px;} h1{font-size:14px;letter-spacing:3px;margin-bottom:4px;} p{font-size:12px;color:#888;margin:4px 0;} img{width:220px;height:220px;margin:16px 0;display:block;margin-left:auto;margin-right:auto;} .code{font-size:28px;font-weight:900;letter-spacing:8px;font-family:monospace;margin:8px 0;} .hint{font-size:11px;color:#aaa;margin-top:8px;line-height:1.6;}</style>
    </head><body onload="window.print()">
    <h1>POLARIS</h1><p>진로성향 검사</p>
    <img src="${img}">
    <div class="code">${code}</div>
    <div class="hint">QR을 스캔하거나 위 코드를 입력해 검사를 시작하세요</div>
    </body></html>`)
    w.document.close()
}

async function fetchAndRender(code) {
    const { data: rows, error } = await sb.from('student_results')
        .select('*').eq('class_code', code).order('created_at', { ascending: false })
    if (error || !rows) return

    document.getElementById('cb-count').textContent = rows.length

    const counts = {}
    rows.forEach(r => { counts[r.galaxy_type] = (counts[r.galaxy_type] || 0) + 1 })
    document.getElementById('dist-wrap').innerHTML = Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .map(([t, n]) => {
            const g = GALAXY[t] || GALAXY[1]
            return `<div class="dist-chip" style="background:${g.bg};color:${g.text};">
                <span class="dist-dot" style="background:${g.color};"></span>
                ${g.name} <strong>${n}명</strong>
            </div>`
        }).join('') || '<span style="color:#ccc;font-size:13px;">없음</span>'

    _rows = rows
    const tbody = document.getElementById('results-tbody')
    if (rows.length === 0) {
        tbody.innerHTML = ''
        document.getElementById('empty-msg').style.display = 'block'
    } else {
        document.getElementById('empty-msg').style.display = 'none'
        tbody.innerHTML = rows.map((r, i) => {
            const g = GALAXY[r.galaxy_type] || GALAXY[1]
            const date = new Date(r.created_at).toLocaleDateString('ko-KR', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' })
            return `<tr>
                <td><strong>${r.student_name}</strong></td>
                <td><span class="galaxy-badge" style="background:${g.bg};color:${g.text};">
                    <span class="badge-dot" style="background:${g.color};"></span>${g.name}
                </span></td>
                <td style="color:#bbb;font-size:12px;">${date}</td>
                <td><button onclick="openStudentPdf(${i})" style="padding:4px 10px;background:#1a1a2e;color:#fff;border:none;border-radius:6px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;">PDF</button></td>
            </tr>`
        }).join('')
    }

    document.getElementById('last-updated').textContent =
        new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
}

window.exportCsv = () => {
    if (!_rows.length) return
    const headers = ['이름', '성향 유형', '탐구', '질서', '온기', '울림', '울타리', '손길', '검사일시']
    const data = _rows.map(r => {
        const g = GALAXY[r.galaxy_type] || GALAXY[1]
        const s = r.scores || {}
        const date = new Date(r.created_at).toLocaleDateString('ko-KR')
        return [r.student_name, g.name, s[1]||0, s[2]||0, s[3]||0, s[4]||0, s[5]||0, s[6]||0, date]
    })
    const csv = [headers, ...data].map(row => row.map(v => `"${v}"`).join(',')).join('\n')
    const blob = new Blob(['﻿' + csv], { type: 'text/csv;charset=utf-8' })
    const a = document.createElement('a')
    a.href = URL.createObjectURL(blob)
    a.download = `POLARIS_${_activeCode}_결과.csv`
    a.click()
    URL.revokeObjectURL(a.href)
}

window.openStudentPdf = (index) => {
    const r = _rows[index]
    if (!r) return
    const g = GALAXY[r.galaxy_type] || GALAXY[1]
    const det = DETAILS[r.galaxy_type] || {}
    sessionStorage.setItem('polaris_teacher_result', JSON.stringify({
        maxPart: r.galaxy_type,
        specialType: null,
        name: g.fullName || g.name,
        tagline: det.tagline || '',
        core: det.core || '',
        moment: det.moment || '',
        jobs: det.jobs || '',
        scores: r.scores || {},
        timestamp: new Date(r.created_at).getTime(),
        studentName: r.student_name
    }))
    window.open(new URL('report.html?mode=teacher', location.href).href, '_blank')
}

window.loadResults = async () => {
    const code = document.getElementById('view-code').value.trim().toUpperCase()
    const errEl = document.getElementById('view-error')
    if (code.length < 6) { errEl.textContent = '6자리 학급 코드를 입력해주세요.'; return }
    errEl.textContent = '조회 중...'

    const { data: cls, error: clsErr } = await sb.from('classes').select('*').eq('code', code).maybeSingle()
    if (clsErr || !cls) { errEl.textContent = '존재하지 않는 학급 코드입니다.'; return }
    errEl.textContent = ''

    document.getElementById('cb-name').textContent = cls.class_name
    document.getElementById('cb-teacher').textContent = cls.teacher_name + ' 선생님'
    document.getElementById('results-area').style.display = 'block'

    _activeCode = code
    await fetchAndRender(code)

    if (_refreshTimer) clearInterval(_refreshTimer)
    _refreshTimer = setInterval(() => fetchAndRender(_activeCode), 10000)
}
</script>
</body>
