<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLARIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #logo {
            font-family: 'Orbitron', 'Arial Black', sans-serif;
            font-size: clamp(2.4rem, 11vw, 6rem);
            font-weight: 900;
            color: #4d8fff;
            letter-spacing: 10px;
            display: flex;
            align-items: center;
            text-shadow:
                0 0 18px rgba(77, 143, 255, 0.9),
                0 0 50px rgba(60, 120, 255, 0.5),
                0 0 100px rgba(40, 100, 255, 0.25);
        }

        #cursor {
            display: inline-block;
            width: 4px;
            height: 0.75em;
            background: #4d8fff;
            margin-left: 6px;
            border-radius: 2px;
            animation: blink 0.55s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        #sub {
            margin-top: 22px;
            font-size: clamp(11px, 2.4vw, 14px);
            color: rgba(255, 255, 255, 0.3);
            letter-spacing: 5px;
            opacity: 0;
            transition: opacity 0.9s ease;
        }
    </style>
</head>
<body>
    <div id="logo">
        <span id="typed"></span>
        <span id="cursor"></span>
    </div>
    <div id="sub">나만의 진로 은하를 찾아서</div>

    <script>
        var code = new URLSearchParams(location.search).get('code');
        var dest = code ? 'polaris.html?code=' + code : 'polaris.html';

        var word  = 'POLARIS';
        var typed = document.getElementById('typed');
        var cur   = document.getElementById('cursor');
        var sub   = document.getElementById('sub');
        var idx   = 0;

        function type() {
            if (idx < word.length) {
                typed.textContent += word[idx++];
                setTimeout(type, 210);
            } else {
                setTimeout(function () {
                    cur.style.display = 'none';
                    sub.style.opacity = '1';
                }, 400);
                setTimeout(function () {
                    document.body.style.transition = 'opacity 0.75s ease';
                    document.body.style.opacity = '0';
                    setTimeout(function () { location.replace(dest); }, 750);
                }, 2600);
            }
        }

        setTimeout(type, 500);
    </script>
</body>
</html>
