<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLARIS</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #logo {
            font-family: 'Orbitron', 'Arial Black', sans-serif;
            font-size: clamp(3rem, 14vw, 7.5rem);
            font-weight: 900;
            color: #fff;
            letter-spacing: 10px;
            text-shadow:
                0 0 30px rgba(100, 150, 255, 1),
                0 0 70px rgba(80, 130, 255, 0.6),
                0 0 140px rgba(60, 110, 255, 0.3);
            animation: appear 1.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        #sub {
            margin-top: 20px;
            font-family: 'Arial', sans-serif;
            font-size: clamp(11px, 2.5vw, 14px);
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 5px;
            animation: appear 1s ease 0.8s forwards;
            opacity: 0;
        }

        @keyframes appear {
            0%   { opacity: 0; transform: scale(0.85) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
    </style>
</head>
<body>
    <div id="logo">POLARIS</div>
    <div id="sub">나만의 진로 은하를 찾아서</div>

    <script>
        var code = new URLSearchParams(location.search).get('code');
        var dest = code ? 'polaris.html?code=' + code : 'polaris.html';
        setTimeout(function () {
            document.body.style.transition = 'opacity 0.7s ease';
            document.body.style.opacity = '0';
            setTimeout(function () { location.replace(dest); }, 700);
        }, 2300);
    </script>
</body>
</html>
