<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9406423137638957"
     crossorigin="anonymous"></script>
    <title>POLARIS - 당신의 내면의 길을 찾아서</title>
    <meta name="description" content="청소년들의 진짜 꿈과 가치를 찾기 위한 탐험, 북극성(Polaris) 프로젝트">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DDVCLM11CG"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-DDVCLM11CG');
    </script>
    <style>
        body {
            background: radial-gradient(circle at center, #1a1a2e 0%, #050505 100%);
            color: #ffffff;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        #stars-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }
    </style>
  <script type="module" crossorigin src="./assets/polaris-DHQEWOGb.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="./assets/style-Fb27fLpU.css">
</head>
<body>
    <!-- Background Space (Subtle Stars) -->
    <div class="aurora-bg">
        <div class="nebula-point nebula-1" id="nebula-1"></div>
        <div class="nebula-point nebula-2" id="nebula-2"></div>
        <div class="nebula-point nebula-3" id="nebula-3"></div>
    </div>
    <canvas id="stars-bg"></canvas>

    <div class="app-container">
        <header class="nav" style="position: relative; z-index: 1000; pointer-events: all;">
            <div class="logo" onclick="location.href='index.html'" style="cursor: pointer; pointer-events: all;">POLARIS</div>
        </header>

        <!-- Section 1: Landing -->
        <section id="landing" class="section active">
            <h1>당신만의 북극성을 찾으세요</h1>
            <p>
                공부라는 정해진 틀에서 벗어나, <br>
                당신이 진정으로 무엇을 원하고 잘하는지 <br>
                은하계의 별들을 통해 발견해 보세요.
            </p>
            <button class="btn-start" onclick="startSurvey()">탐험 시작하기</button>
        </section>

        <!-- Section 2: Survey -->
        <section id="survey" class="section">
            <div class="survey-card">
                <div class="survey-header">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                        <span id="part-label" class="question-part-label" style="margin-bottom:0;"></span>
                        <span id="progress-pct" style="font-size:0.72rem; color:rgba(255,255,255,0.45); font-family:'Orbitron',sans-serif; letter-spacing:1px;">0%</span>
                    </div>
                    <div class="survey-progress">
                        <div id="progress-bar" class="progress-bar"></div>
                    </div>
                </div>
                <div id="question-container">
                    <h2 id="question-text">질문을 불러오는 중...</h2>
                    <div class="rating-options">
                        <button class="rating-btn" data-value="1">
                            <strong>1</strong>
                            <span>전혀 아니다</span>
                        </button>
                        <button class="rating-btn" data-value="2">
                            <strong>2</strong>
                            <span>아니다</span>
                        </button>
                        <button class="rating-btn" data-value="3">
                            <strong>3</strong>
                            <span>보통이다</span>
                        </button>
                        <button class="rating-btn" data-value="4">
                            <strong>4</strong>
                            <span>그렇다</span>
                        </button>
                        <button class="rating-btn" data-value="5">
                            <strong>5</strong>
                            <span>매우 그렇다</span>
                        </button>
                    </div>
                </div>
                <div class="survey-footer">
                    <button id="prev-btn" class="btn-prev" onclick="prevQuestion()" style="visibility: hidden;">이전으로</button>
                </div>
            </div>
        </section>

        <!-- Section 3: Result (Canvas) -->
        <section id="result" class="section">
            <div id="canvas-container"></div>

            <!-- 폭발 후 상단 타이틀 -->
            <div id="result-ui-top">
                <h1 id="result-title-top"></h1>
            </div>

            <!-- 하단 UI (초기 + 폭발 후) -->
            <div id="result-ui">
                <h1 id="result-title"></h1>
                <p id="result-desc"></p>
                <p id="result-sub" style="display:none; font-size:0.72rem; color:rgba(255,255,255,0.45); margin-top:0.4rem;">화면을 직접 움직이며 은하를 관찰하세요</p>
                <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                    <button id="restart-btn" class="btn-start" style="margin-top: 1.5rem; pointer-events: all; display: none;" onclick="location.href='index.html'">메인으로 돌아가기</button>
                </div>
            </div>
        </section>

        <!-- Galaxy Detail Modal -->
        <div id="galaxy-modal" class="modal-overlay">
            <div class="modal-content">
                <button class="modal-back" onclick="closeModal()">←</button>
                <button class="modal-close" onclick="closeModal()">×</button>
                <div class="modal-body">
                    <h2 id="modal-galaxy-name">은하 이름</h2>
                    <p id="modal-tagline" style="font-style: italic; opacity: 0.8; margin-top: -1.5rem; margin-bottom: 2rem; font-size: 0.9rem; color: var(--accent-blue);">"태그라인"</p>

                    <div class="modal-info-section">
                        <h3>✨ 당신의 핵심 재능</h3>
                        <p id="modal-core">핵심 설명...</p>
                    </div>

                    <div class="modal-info-section">
                        <h3>🌟 당신이 빛나는 순간</h3>
                        <p id="modal-moment">순간 설명...</p>
                    </div>

                    <div class="modal-info-section">
                        <h3>🚀 추천 직업</h3>
                        <p id="modal-jobs" style="line-height: 1.8; word-break: keep-all; color: #fff;"></p>
                    </div>

                </div>
                <div class="modal-footer">
                    <p id="modal-disclaimer" style="font-size: 0.8rem; opacity: 0.6; text-align: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 1rem;"></p>
                </div>
            </div>
        </div>

        <!-- Creation Overlay -->
        <div id="creation-overlay">
            <h2 id="creation-text">당신의 내면의 북극성이 만들어집니다...</h2>
        </div>
    </div>

    <!-- 하단 탭 내비게이션 -->
    <nav class="bottom-nav">
        <a href="index.html" class="tab-item">
            <span class="tab-icon">🏠</span>
            <span class="tab-label">홈</span>
        </a>
        <a href="polaris.html" class="tab-item active">
            <span class="tab-icon">⭐</span>
            <span class="tab-label">검사</span>
        </a>
        <a href="jobs.html" class="tab-item">
            <span class="tab-icon">🔭</span>
            <span class="tab-label">직업</span>
        </a>
        <a href="results-guide.html" class="tab-item">
            <span class="tab-icon">🌌</span>
            <span class="tab-label">가이드</span>
        </a>
    </nav>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
</body>
</html>
